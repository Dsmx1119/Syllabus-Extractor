<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Syllabus Terminator</title>
    <script>
      window.__syllabusBooted = false;

      function showBootMessage(title, details) {
        const existing = document.getElementById('boot-diagnostics');

        if (existing) {
          existing.remove();
        }

        const panel = document.createElement('pre');
        panel.id = 'boot-diagnostics';
        panel.style.position = 'fixed';
        panel.style.left = '16px';
        panel.style.right = '16px';
        panel.style.top = '16px';
        panel.style.zIndex = '9999';
        panel.style.margin = '0';
        panel.style.padding = '16px';
        panel.style.borderRadius = '16px';
        panel.style.background = '#fff7ed';
        panel.style.border = '1px solid #fdba74';
        panel.style.color = '#9a3412';
        panel.style.font = '12px/1.6 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace';
        panel.style.whiteSpace = 'pre-wrap';
        panel.textContent = title + '\n\n' + details;
        document.body.appendChild(panel);
      }

      window.addEventListener('error', function (event) {
        const stack = event.error && event.error.stack ? '\n\n' + event.error.stack : '';
        showBootMessage('Frontend boot error', (event.message || 'Unknown error') + stack);
      });

      window.addEventListener('unhandledrejection', function (event) {
        const reason = event.reason && event.reason.stack ? event.reason.stack : String(event.reason);
        showBootMessage('Unhandled promise rejection', reason || 'Unknown rejection');
      });

      window.setTimeout(function () {
        if (!window.__syllabusBooted) {
          showBootMessage(
            'App did not finish mounting',
            'The server responded, but the React app did not attach to #root. Open DevTools Console if this message persists.'
          );
        }
      }, 2500);
    </script>
  </head>
  <body>
    <div id="root">Loading Syllabus Terminator...</div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
